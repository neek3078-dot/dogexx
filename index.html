<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Audio Party Lights</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none; 
            -webkit-user-select: none;
            /* Using a CSS variable for smooth pulsing */
            background: radial-gradient(circle, var(--color1) 0%, var(--color2) 100%);
            --color1: #000;
            --color2: #000;
        }

        .ui-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff0055, #00eeff);
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,255,255,0.4);
            cursor: pointer;
            transition: all 0.2s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,255,255,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 10px 40px rgba(255,0,85,0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,255,255,0.4); }
        }

        #startBtn:active {
            transform: scale(0.95);
            animation: none;
        }

        #statusText {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
        }

        #stopBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-weight: bold;
            z-index: 20;
            display: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-container" id="uiContainer">
        <button id="startBtn">Sync to Music 🎤</button>
        <div id="statusText">
            Place phone near speakers.<br>
            Requires microphone permission.
        </div>
    </div>

    <button id="stopBtn">STOP</button>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const uiContainer = document.getElementById('uiContainer');
        const body = document.body;

        let audioContext, analyser, dataArray;
        let animationId;
        let wakeLock = null;
        let mediaStream = null;

        const colors = [
            '#FF0000', '#00FF00', '#0000FF', 
            '#FFFF00', '#00FFFF', '#FF00FF', 
            '#FFFFFF', '#FF4500', '#7FFF00'
        ];

        startBtn.addEventListener('click', async () => {
            try {
                // 1. Get Microphone Access
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // 2. Setup Audio Processing
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);
                
                // Fine-tune how the audio is sliced up
                analyser.fftSize = 256; 
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // 3. Fullscreen & Wake Lock (Mobile Essentials)
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');

                // 4. Update UI
                uiContainer.classList.add('hidden');
                stopBtn.style.display = 'block';

                // 5. Start the visualizer loop
                visualize();

            } catch (err) {
                alert("Microphone access is required to sync with music! " + err.message);
            }
        });

        function visualize() {
            animationId = requestAnimationFrame(visualize);
            analyser.getByteFrequencyData(dataArray);

            // Focus on the bass (lower frequencies)
            let bassTotal = 0;
            const bassBins = 10; // Number of lower frequency bins to check
            for(let i = 0; i < bassBins; i++) {
                bassTotal += dataArray[i];
            }
            const bassAverage = bassTotal / bassBins;

            // If the bass average spikes past a certain volume (threshold 180 out of 255)
            if (bassAverage > 180) {
                // Heavy beat detected - Flash random high-intensity colors
                const c1 = colors[Math.floor(Math.random() * colors.length)];
                const c2 = colors[Math.floor(Math.random() * colors.length)];
                body.style.setProperty('--color1', c1);
                body.style.setProperty('--color2', c2);
            } else {
                // No beat detected - Dim down to black to make the next flash pop
                body.style.setProperty('--color1', '#000');
                body.style.setProperty('--color2', '#111');
            }
        }

        // Stop functionality
        stopBtn.addEventListener('click', () => {
            // Stop Visualizer
            cancelAnimationFrame(animationId);
            
            // Turn off Microphone
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext) audioContext.close();

            // Reset UI
            body.style.setProperty('--color1', '#000');
            body.style.setProperty('--color2', '#000');
            uiContainer.classList.remove('hidden');
            stopBtn.style.display = 'none';

            // Exit Fullscreen & Wake Lock
            if (document.fullscreenElement) document.exitFullscreen();
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        });
    </script>
</body>
</html>
